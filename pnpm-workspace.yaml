packages:
  - .

# Flat node_modules so electron-builder reliably copies every transitive
# dependency into the packaged app (the isolated/symlinked layout drops deep
# deps like `ms`, which crashed the packaged main process at startup).
nodeLinker: hoisted

allowBuilds:
  '@homebridge/node-pty-prebuilt-multiarch': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true

patchedDependencies:
  '@homebridge/node-pty-prebuilt-multiarch@0.13.1': patches/@homebridge__node-pty-prebuilt-multiarch@0.13.1.patch

# Force the patched js-yaml into electron-updater's dependency (GHSA-h67p-54hq-rp68,
# quadratic-complexity DoS). Scoped to vulnerable versions; stays in the 4.x line.
overrides:
  js-yaml@<4.1.2: ^4.2.0
